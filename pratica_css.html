<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula CSS - 1</title>
	<link rel="stylesheet" href="styles .css">
  </head>
  <body>
    <div class="card">
      <div
        style="
          width: 100px;
          height: 100px;
          border-radius: 50%;
          padding-bottom: 10px;
        "
      >
        <img
          class="foto"
          src="https://cdn-icons-png.flaticon.com/512/706/706830.png"
          alt=""
        />
      </div>

      <div>
        <h1 class="titulo">
          Meu nome é: <span class="cordestaque">Adriana</span>
        </h1>

        <p>
          <span>Mensagem: </span>
          <span class="cordestaque" class="estilofonte"
            >A vida não é um morango!</span
          >
        </p>
      </div>
    </div>

    <div
      style="
        width: 500px;
        height: fit-content;
        background-color: aliceblue;
        border-radius: 25px;
        border: solid 8px green;
        margin: 20px;
      "
    >
      <div class="card">
        <img
          class="foto"
          src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png"
          alt=""
        />
      </div>

      <div>
        <h1 class="titulo">
          Meu nome é: <span class="cordestaque">Hugo</span>
        </h1>

        <p>
          Mensagem: <span class="cordestaque" class="estilofonte">dia é da caça, o outro é do caçador</span> .
        </p>
      </div>
    </div>
  </body>
</html>
